default:
  tags:
    - docker

.env_template: &env_definition
  - export PYTHONWARNINGS=error

.lint_template: &lint_definition
  stage: test
  allow_failure: true
  script:
    - black --check --diff .
    - flake8 .
    - isort --check-only --diff .

.build:doc: &doc_definition
  stage: build
  script:
    - sphinx-build -M html docs/ docs/_build -W --keep-going
  needs: []

.test_template: &test_definition
  stage: test
  script:
    - *env_definition
    - coverage run -m pytest --junitxml pytest.xml
    - coverage combine
    - coverage report
    - coverage xml
  needs: []
  coverage: '/TOTAL.+ ([0-9]{1,3}%)/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
      junit: pytest.xml

lint:python3.12:
  <<: *lint_definition
  image: sergiud/conics:python3.12
  needs: []

docs:python3.12:
  <<: *doc_definition
  image: sergiud/conics:python3.12
  needs: []

test:python3.12:
  <<: *test_definition
  image: sergiud/conics:python3.12
  needs: []

